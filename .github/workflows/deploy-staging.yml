name: Deploy Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true # Cancel in-progress staging deploys on new push

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  deploy-api-staging:
    needs: ci-gate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Run database migrations (staging)
        run: |
          npm install -g prisma@5.15.0
          prisma migrate deploy
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      - name: Deploy API to Railway (staging)
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: dotly-api-staging

  deploy-web-staging:
    needs: [ci-gate, deploy-api-staging]
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      preview-url: ${{ steps.web-url.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy web to Railway (staging)
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: dotly-web-staging
      - name: Resolve staging web URL
        id: web-url
        run: echo "preview-url=${{ secrets.STAGING_WEB_URL }}" >> "$GITHUB_OUTPUT"

  smoke-test-staging:
    needs: [deploy-api-staging, deploy-web-staging]
    runs-on: ubuntu-latest
    env:
      STAGING_WEB_URL: ${{ needs.deploy-web-staging.outputs.preview-url }}
    steps:
      - name: API health check (staging)
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.dotly.one/health)
            if [ "$STATUS" = "200" ]; then
              echo "Staging API is healthy"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging API health check failed after 5 attempts"
          exit 1
      - name: Validate staging web deployment URL
        run: |
          if [ -z "$STAGING_WEB_URL" ]; then
            echo "Missing STAGING_WEB_URL for deploy-web-staging"
            exit 1
          fi
          echo "Testing staging web at $STAGING_WEB_URL"
      - name: Web health check (staging preview)
        run: |
          healthy=false
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_WEB_URL/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "Staging web health endpoint is healthy"
              healthy=true
              break
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          if [ "$healthy" != "true" ]; then
            echo "Staging web health check failed after 5 attempts"
            exit 1
          fi
      - name: Web smoke test (staging preview)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_WEB_URL/")
          if [ "$STATUS" = "200" ]; then
            echo "Staging web homepage is healthy"
          else
            echo "Staging web smoke test failed: $STATUS"
            exit 1
          fi

  observability-smoke-staging:
    needs: [deploy-api-staging, deploy-web-staging]
    runs-on: ubuntu-latest
    env:
      STAGING_WEB_URL: ${{ needs.deploy-web-staging.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate staging observability wiring
        run: pnpm observability:smoke
        env:
          METRICS_BASE_URL: https://api-staging.dotly.one
          WEB_BASE_URL: ${{ env.STAGING_WEB_URL }}

  load-test-staging:
    needs: [smoke-test-staging, observability-smoke-staging]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run public sales-link load test against staging
        run: k6 run apps/api/load-tests/public-sales-link.js
        env:
          BASE_URL: https://api-staging.dotly.one
      - name: Run sales-link booking load test against staging
        run: k6 run apps/api/load-tests/sales-link-booking.js
        env:
          BASE_URL: https://api-staging.dotly.one
      - name: Run payment webhook burst load test against staging
        run: k6 run apps/api/load-tests/payment-webhook-burst.js
        env:
          BASE_URL: https://api-staging.dotly.one
