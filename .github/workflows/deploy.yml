name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # Never cancel a deploy in progress

jobs:
  # Gate: all CI checks must pass
  ci-gate:
    uses: ./.github/workflows/ci.yml

  deploy-api:
    needs: ci-gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Run database migrations
        # Run migrations against the production DB before deploying new API code.
        # This ensures the schema is up to date before the new binary starts.
        # Pin prisma CLI to the same version used in packages/database/package.json
        # to prevent a breaking CLI update from silently changing migration behaviour.
        run: |
          npm install -g prisma@5.15.0
          prisma migrate deploy
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: dotly-api

  deploy-web:
    needs: [ci-gate, deploy-api]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy web to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: dotly-web

  smoke-test:
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: API health check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.dotly.one/health)
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "API health check failed after 5 attempts"
          exit 1
      - name: Web smoke test
        # Check the homepage (/) instead of a hardcoded user handle.
        # A 200 from the homepage confirms Next.js is up without depending on test data.
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dotly.one/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "Web health endpoint is healthy"
          else
            echo "Web health check failed: $STATUS"
            exit 1
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dotly.one/)
          if [ "$STATUS" = "200" ]; then
            echo "Web homepage is healthy"
          else
            echo "Web smoke test failed: $STATUS"
            exit 1
          fi

  observability-smoke:
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate production observability wiring
        run: pnpm observability:smoke
        env:
          METRICS_BASE_URL: https://api.dotly.one
          WEB_BASE_URL: https://dotly.one

  rollback-on-failure:
    needs: [smoke-test, observability-smoke]
    if: always() && failure()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Rollback API to previous Railway deployment
        # Rolls back the Railway service to the last successful deployment.
        # Requires RAILWAY_TOKEN with write access to the project.
        run: |
          echo "Smoke tests failed — triggering Railway rollback for dotly-api"
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { deploymentRestart(id: \"${{ secrets.RAILWAY_PREV_DEPLOYMENT_ID }}\") { id } }"}' \
            || true
          echo "IMPORTANT: Verify rollback manually in Railway dashboard if this step failed."
          echo "Also roll back the dotly-web Railway service from the Railway dashboard if needed."
      - name: Notify rollback triggered
        run: echo "::warning::Smoke tests failed. Rollback initiated. Check Railway dashboards."
