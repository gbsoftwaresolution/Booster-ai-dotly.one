name: EAS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build on EAS
        run: eas build --platform all --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive
        working-directory: apps/mobile

  # Submitting to app stores is a separate job that requires explicit approval
  # for production builds. This prevents an accidental tag push from shipping
  # an untested binary directly to production store users.
  submit:
    needs: build
    runs-on: ubuntu-latest
    # Only run for production builds and require manual approval via GitHub environment protection rules.
    # Set up a "store-submit" environment in GitHub repo settings with required reviewers.
    if: ${{ github.event.inputs.profile == 'production' || startsWith(github.ref, 'refs/tags/v') }}
    environment: store-submit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Submit to app stores
        run: eas submit --platform all --non-interactive
        working-directory: apps/mobile
