name: Load Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'API base URL to test (must be the staging or production URL)'
        required: true
        default: 'https://api-staging.dotly.one'
      test_username:
        description: 'Public sales-link username used by the launch-path scenarios'
        required: false
        default: 'prouser'
  schedule:
    # Run load tests weekly on Sundays at 2am UTC against staging
    - cron: '0 2 * * 0'

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run public sales-link load test
        run: k6 run apps/api/load-tests/public-sales-link.js
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://api-staging.dotly.one' }}
          TEST_USERNAME: ${{ github.event.inputs.test_username || 'prouser' }}
      - name: Run sales-link booking load test
        run: k6 run apps/api/load-tests/sales-link-booking.js
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://api-staging.dotly.one' }}
          TEST_USERNAME: ${{ github.event.inputs.test_username || 'prouser' }}
      - name: Run payment webhook burst load test
        run: k6 run apps/api/load-tests/payment-webhook-burst.js
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://api-staging.dotly.one' }}
