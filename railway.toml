[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = [
  "apps/api/**",
  "apps/api/railway.toml",
  "apps/api/railway.json",
  "packages/database/**",
  "packages/types/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "railway.toml",
  "turbo.json",
]

[deploy]
releaseCommand = "pnpm --filter @dotly/database exec prisma migrate deploy"
startCommand = "node apps/api/dist/src/main"
healthcheckPath = "/health/live"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 2