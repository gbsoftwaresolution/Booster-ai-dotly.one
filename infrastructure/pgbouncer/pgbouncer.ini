[databases]
# H-03: Use the Docker Compose service name (postgres) as the host so
# PgBouncer can resolve it inside the Docker network.  "localhost" only
# works when PgBouncer and Postgres share the same network namespace (e.g.
# both running on the host), which is NOT the case in Docker Compose.
dotly_one = host=postgres dbname=dotly_one user=naveenprasath-p

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
# H-02: Use scram-sha-256 instead of trust.  "trust" allows any client to
# connect as any user with no password — never acceptable in production.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
server_idle_timeout = 600
client_idle_timeout = 60
log_connections = 0
log_disconnections = 0
stats_period = 60
